<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --card: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --text: #e5e7eb;
      --muted: rgba(255,255,255,0.5);
      --accent: #60a5fa;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    .search-bar {
      display: flex; gap: 10px;
      width: 100%; max-width: 480px;
      margin-bottom: 32px;
    }

    .search-bar input {
      flex: 1; padding: 12px 18px;
      background: var(--card); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 50px;
      color: var(--text); font-family: inherit; font-size: 15px;
      outline: none; transition: border 0.2s;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus { border-color: var(--accent); }

    .search-bar button {
      padding: 12px 22px; background: var(--accent);
      border: none; border-radius: 50px; color: #0f172a;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .search-bar button:hover { opacity: 0.85; }

    .main-card {
      width: 100%; max-width: 480px;
      background: var(--card); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 24px;
      padding: 32px;
      display: none;
    }
    .main-card.visible { display: block; }

    .city-name { font-size: 28px; font-weight: 700; }
    .date-text { font-size: 14px; color: var(--muted); margin-top: 4px; }

    .weather-main {
      display: flex; align-items: center; justify-content: space-between;
      margin: 24px 0;
    }
    .temp-big { font-size: 72px; font-weight: 300; line-height: 1; }
    .weather-icon { font-size: 72px; }
    .weather-desc { font-size: 16px; color: var(--muted); text-transform: capitalize; margin-top: 4px; }

    .details-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin: 24px 0;
    }
    .detail-box {
      background: rgba(255,255,255,0.05);
      border-radius: 14px; padding: 14px;
      text-align: center;
    }
    .detail-icon { font-size: 20px; margin-bottom: 6px; }
    .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 16px; font-weight: 600; margin-top: 2px; }

    .forecast-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
    .forecast-row { display: flex; justify-content: space-between; gap: 8px; }
    .forecast-day {
      flex: 1; text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 12px; padding: 12px 6px;
    }
    .forecast-day .day-name { font-size: 12px; color: var(--muted); }
    .forecast-day .day-icon { font-size: 22px; margin: 6px 0; }
    .forecast-day .day-temp { font-size: 14px; font-weight: 600; }

    .error { color: #f87171; text-align: center; max-width: 480px; margin-top: 12px; }
    .loading { color: var(--muted); text-align: center; max-width: 480px; margin-top: 24px; font-size: 14px; }
  </style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="city-input" placeholder="Search city..." value="Bengaluru" />
  <button onclick="fetchWeather()">Search</button>
</div>

<div class="main-card" id="main-card">
  <div id="city-name" class="city-name"></div>
  <div id="date-text" class="date-text"></div>

  <div class="weather-main">
    <div>
      <div id="temp-big" class="temp-big"></div>
      <div id="weather-desc" class="weather-desc"></div>
    </div>
    <div id="weather-icon" class="weather-icon"></div>
  </div>

  <div class="details-grid">
    <div class="detail-box">
      <div class="detail-icon">💧</div>
      <div class="detail-label">Humidity</div>
      <div class="detail-value" id="humidity"></div>
    </div>
    <div class="detail-box">
      <div class="detail-icon">💨</div>
      <div class="detail-label">Wind</div>
      <div class="detail-value" id="wind"></div>
    </div>
    <div class="detail-box">
      <div class="detail-icon">👁️</div>
      <div class="detail-label">Feels Like</div>
      <div class="detail-value" id="feels-like"></div>
    </div>
  </div>

  <div class="forecast-title">5-Day Forecast</div>
  <div class="forecast-row" id="forecast-row"></div>
</div>

<div class="error" id="error-msg"></div>
<div class="loading" id="loading-msg"></div>

<script>
  const API_KEY = "YOUR_OPENWEATHER_API_KEY"; // Get free key at openweathermap.org

  const weatherIcons = {
    Clear: "☀️", Clouds: "☁️", Rain: "🌧️", Drizzle: "🌦️",
    Thunderstorm: "⛈️", Snow: "❄️", Mist: "🌫️", Fog: "🌫️",
    Haze: "🌫️", Smoke: "🌫️",
  };

  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

  async function fetchWeather() {
    const city = document.getElementById("city-input").value.trim();
    if (!city) return;

    document.getElementById("error-msg").textContent = "";
    document.getElementById("loading-msg").textContent = "Fetching weather...";
    document.getElementById("main-card").classList.remove("visible");

    try {
      // Current weather
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
      );
      if (!res.ok) throw new Error("City not found");
      const data = await res.json();

      // Forecast
      const forecastRes = await fetch(
        `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&cnt=40`
      );
      const forecastData = await forecastRes.json();

      renderWeather(data);
      renderForecast(forecastData.list);
      document.getElementById("loading-msg").textContent = "";
      document.getElementById("main-card").classList.add("visible");
    } catch (err) {
      document.getElementById("loading-msg").textContent = "";
      document.getElementById("error-msg").textContent = `⚠️ ${err.message}. Check your API key or city name.`;
    }
  }

  function renderWeather(data) {
    const now = new Date();
    document.getElementById("city-name").textContent = `${data.name}, ${data.sys.country}`;
    document.getElementById("date-text").textContent = now.toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long" });
    document.getElementById("temp-big").textContent = `${Math.round(data.main.temp)}°`;
    document.getElementById("weather-desc").textContent = data.weather[0].description;
    document.getElementById("weather-icon").textContent = weatherIcons[data.weather[0].main] || "🌤️";
    document.getElementById("humidity").textContent = `${data.main.humidity}%`;
    document.getElementById("wind").textContent = `${Math.round(data.wind.speed)} m/s`;
    document.getElementById("feels-like").textContent = `${Math.round(data.main.feels_like)}°C`;
  }

  function renderForecast(list) {
    const seen = new Set();
    const daily = list.filter((item) => {
      const day = new Date(item.dt * 1000).getDay();
      if (!seen.has(day)) { seen.add(day); return true; }
      return false;
    }).slice(1, 6);

    document.getElementById("forecast-row").innerHTML = daily.map((item) => {
      const date = new Date(item.dt * 1000);
      return `
        <div class="forecast-day">
          <div class="day-name">${days[date.getDay()]}</div>
          <div class="day-icon">${weatherIcons[item.weather[0].main] || "🌤️"}</div>
          <div class="day-temp">${Math.round(item.main.temp)}°</div>
        </div>
      `;
    }).join("");
  }

  document.getElementById("city-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") fetchWeather();
  });

  // Demo mode: show static data without API key
  (function demoLoad() {
    document.getElementById("city-name").textContent = "Bengaluru, IN";
    document.getElementById("date-text").textContent = new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long" });
    document.getElementById("temp-big").textContent = "27°";
    document.getElementById("weather-desc").textContent = "partly cloudy";
    document.getElementById("weather-icon").textContent = "⛅";
    document.getElementById("humidity").textContent = "72%";
    document.getElementById("wind").textContent = "3.2 m/s";
    document.getElementById("feels-like").textContent = "29°C";
    document.getElementById("forecast-row").innerHTML = [
      { day: "Mon", icon: "🌦️", temp: 25 },
      { day: "Tue", icon: "☀️", temp: 29 },
      { day: "Wed", icon: "⛅", temp: 27 },
      { day: "Thu", icon: "🌧️", temp: 23 },
      { day: "Fri", icon: "☀️", temp: 28 },
    ].map((d) => `
      <div class="forecast-day">
        <div class="day-name">${d.day}</div>
        <div class="day-icon">${d.icon}</div>
        <div class="day-temp">${d.temp}°</div>
      </div>
    `).join("");
    document.getElementById("main-card").classList.add("visible");
  })();
</script>

</body>
</html>
